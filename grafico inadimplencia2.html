<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<title>Dashboard Financeiro</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>

<style>

body{
margin:0;
font-family:Segoe UI, Arial;
background:linear-gradient(180deg,#0f172a,#020617);
color:white;
}

.wrapper{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{

width:1200px;
padding:40px;

background:linear-gradient(145deg,#1e293b,#020617);

border-radius:14px;

box-shadow:
0 10px 40px rgba(0,0,0,0.6),
inset 0 1px 0 rgba(255,255,255,0.05);

}

.title{
font-size:26px;
font-weight:600;
margin-bottom:30px;
color:#e2e8f0;
}

.chart-link:hover{
cursor:pointer;
opacity:0.9;
}

</style>

</head>

<body>

<div class="wrapper">

<div class="card">

<div class="title">
Evolução Financeira Mensal
</div>

<a href="https://seulink.com" target="_blank" class="chart-link">
<canvas id="grafico" height="420"></canvas>
</a>

</div>

</div>

<script>

const ctx = document.getElementById('grafico').getContext('2d');

const gradient = ctx.createLinearGradient(0,0,0,400);

gradient.addColorStop(0,'rgba(56,189,248,0.5)');
gradient.addColorStop(1,'rgba(56,189,248,0)');

new Chart(ctx,{

type:'line',

data:{

labels:[
'jan 2024','fev 2024','mar 2024','abr 2024','mai 2024','jun 2024',
'jul 2024','ago 2024','set 2024','out 2024','nov 2024','dez 2024',
'jan 2025','fev 2025','mar 2025','abr 2025','mai 2025','jun 2025',
'jul 2025','ago 2025','jan 2026','fev 2026'
],

datasets:[{

label:"Valor",

data:[
10204,14330,14304,15767,15520,15966,14505,17458,
15210,17775,16839,17491,15614,16980,17945,16062,
14323,15198,14740,14816,17234,16596
],

borderColor:'#38bdf8',
backgroundColor:gradient,

fill:true,
tension:0.35,

pointRadius:4,
pointHoverRadius:7,

pointBackgroundColor:'#38bdf8'

}]

},

options:{

responsive:true,
maintainAspectRatio:false,

layout:{
padding:{top:40,right:40,left:20,bottom:20}
},

plugins:{

legend:{
labels:{color:'#cbd5f5'}
},

datalabels:{
color:'#e2e8f0',
align:'top',
anchor:'end',
offset:6,
clip:false,
font:{weight:'600'},
formatter:(v)=>'R$ '+v.toLocaleString('pt-BR')
}

},

scales:{

x:{
ticks:{color:'#94a3b8'},
grid:{display:false}
},

y:{

ticks:{
color:'#94a3b8',
callback:(v)=>'R$ '+v.toLocaleString('pt-BR')
},

grid:{
color:'rgba(148,163,184,0.2)',
borderDash:[4,4]
}

}

},

animation:{
duration:1200,
easing:'easeOutQuart'
}

},

plugins:[ChartDataLabels]

});

</script>

</body>
</html>
